<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GB TechStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>GB TechStore</h1></header>
    
    <main>
        <div class="login-box">
            <h2>Login</h2>
            <form id="loginForm">
                <label>Usuário:</label>
                <input type="text" id="usuario" required>
                <label>Senha:</label>
                <input type="password" id="senha" required>
                <button type="submit">Entrar</button>
            </form>
            <p id="mensagem" style="color: red; text-align: center;"></p>
        </div>
    </main>

    <footer><p>&copy; 2026 GB TechStore. Todos os direitos reservados</p></footer>

    <script src="script.js"></script>

</body>
</html>
